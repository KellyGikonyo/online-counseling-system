<!--student-dashboard.html-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #f3f6fa; margin: 0; }
        .dashboard { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 14px; box-shadow: 0 2px 16px rgba(60,90,180,0.08); padding: 32px 24px; }
        .dashboard-nav { margin-bottom: 24px; }
        .nav-btn { display: inline-block; margin-right: 10px; padding: 10px 20px; background: #e0e7ff; color: #374151; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .nav-btn:hover, .nav-btn.active { background: #6366f1; color: #fff; }
        h2 { color: #6366f1; }
        .section { margin-bottom: 40px; display: none; }
        .section.active { display: block; }
        .logout-btn { background: #d32f2f; color: #fff; }
        .logout-btn:hover { background: #b91c1c; }
        ul { padding-left: 18px; }
        .inbox-message { background: #f1f5f9; border-radius: 8px; margin-bottom: 12px; padding: 12px 14px; }
        .inbox-message .meta { font-size: 0.95em; color: #6366f1; margin-bottom: 6px; }
        .inbox-message .msg-text { color: #22223b; }
        .reply-form { margin-top: 28px; }
        .reply-form input, .reply-form textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #a5b4fc; margin-bottom: 8px; }
        .reply-form button { margin-top: 10px; padding: 10px 28px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .reply-form button:hover { background: #4338ca; }
        .bold-label { font-weight: 600; }
        .section-title {
            margin-bottom: 10px;
            color: #6366f1;
        }
        .send-message-title {
            margin-bottom: 10px;
            color: #6366f1;
        }
        .submit-feedback-title {
            margin-bottom: 10px;
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-nav">
            <a href="#" class="nav-btn active" onclick="showSection('inbox')">Inbox</a>
            <a href="#" class="nav-btn" onclick="showSection('sessions')">Sessions</a>
            <a href="#" class="nav-btn" onclick="showSection('feedback')">Feedback</a>
            <a href="index.html" class="nav-btn logout-btn" onclick="logout()">Logout</a>
        </div>
        <h2>Student Dashboard</h2>

        <!-- Inbox Section -->
                <h4 class="send-message-title">Send Message to Counselor</h4>
            <h3>Your Inbox</h3>
            <div id="messages"></div>
            <div class="reply-form">
                <h4 class="send-message-title">Send Message to Counselor</h4>
                <label for="replyText" class="bold-label">Your Message</label>
                <label for="replyText" class="bold-label">Your Message</label>
                <textarea id="replyText" rows="3" placeholder="Type your message..."></textarea>
                <button onclick="sendReply()">Send</button>
            </div>
        </div>

        <!-- Sessions Section -->
        <div class="section" id="sessionsSection">
            <h3>Your Sessions</h3>
            <ul id="studentSessionsList"></ul>
        </div>

        <!-- Feedback Section -->
                <h4 class="submit-feedback-title">Submit Feedback</h4>
            <h3>Your Feedback</h3>
            <ul id="studentFeedbackList"></ul>
            <div class="reply-form">
                <h4 class="submit-feedback-title">Submit Feedback</h4>
                <input type="text" id="feedbackTo" placeholder="Counselor Username" required>
                <label for="feedbackRating" class="bold-label">Rating (1-5)</label>
                <input type="number" id="feedbackRating" min="1" max="5" required>
                <label for="feedbackComment" style="font-weight:600;">Comment</label>
                <textarea id="feedbackComment" rows="3" placeholder="Type your feedback..."></textarea>
                <button onclick="sendFeedback()">Submit Feedback</button>
            </div>
        </div>
    </div>

    <script>
        // Only let students in!
        if (localStorage.getItem('userRole') !== 'student') {
            window.location.href = "index.html";
        }

        // Navigation logic
        function showSection(section) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            if(section === 'inbox') {
                document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
                document.getElementById('inboxSection').classList.add('active');
                loadInbox();
            } else if(section === 'sessions') {
                document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                document.getElementById('sessionsSection').classList.add('active');
                loadSessions();
            } else if(section === 'feedback') {
                document.querySelector('.nav-btn:nth-child(3)').classList.add('active');
                document.getElementById('feedbackSection').classList.add('active');
                loadFeedback();
            }
        }

        // Inbox logic
        const student = localStorage.getItem('username') || 'student';

        function loadInbox() {
            fetch(`http://localhost:3000/inbox/${student}`)
                .then(res => res.json())
                .then(data => {
                    const messagesDiv = document.getElementById('messages');
                    if (!data.length) {
                        messagesDiv.innerHTML = "<p style='color:#888;text-align:center;'>No messages yet.</p>";
                        return;
                    }
                    messagesDiv.innerHTML = data.map(m =>
                        `<div class="inbox-message">
                            <div class="meta">
                                <span>From: <span style="color:#374151;">${m.fromUser}</span></span>
                                <span style="margin-left:18px;">To: <span style="color:#374151;">${m.toUser}</span></span>
                                <span class="timestamp">${m.time ? new Date(m.time).toLocaleString() : ''}</span>
                            </div>
                            <div class="msg-text">${m.text}</div>
                        </div>`
                    ).join('');
                });
        }

        function sendReply() {
            const to = document.getElementById('counselor').value.trim();
            const text = document.getElementById('replyText').value.trim();
            if (!to || !text) return alert("Enter counselor username and message.");

            fetch('http://localhost:3000/send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fromUser: localStorage.getItem('username'),
                    toUser: to,
                    text: text
                })
            }).then(() => {
                document.getElementById('replyText').value = '';
                loadInbox();
            });
        }

        // Sessions logic
        function loadSessions() {
            fetch(`http://localhost:3000/sessions?student=${encodeURIComponent(student)}`)
                .then(res => res.json())
                .then(data => {
                    const sessionsList = document.getElementById('studentSessionsList');
                    if (!data.length) {
                        sessionsList.innerHTML = "<li>No sessions found.</li>";
                        return;
                    }
                    sessionsList.innerHTML = data.map(s =>
                        `<li>${s.date} - ${s.time}: ${s.topic || s.reason || ''} with ${s.counselor}</li>`
                    ).join('');
                });
        }

        // Feedback logic
        function loadFeedback() {
            fetch('http://localhost:3000/feedback')
                .then(res => res.json())
                .then(feedbacks => {
                    const myFeedbacks = feedbacks.filter(f => f.fromUser === student);
                    const feedbackList = document.getElementById('studentFeedbackList');
                    if (!myFeedbacks.length) {
                        feedbackList.innerHTML = "<li>No feedback submitted yet.</li>";
                        return;
                    }
                    feedbackList.innerHTML = myFeedbacks.map(f =>
                        `<li>To: ${f.toUser} | Rating: ${f.rating} | Comment: ${f.comment}</li>`
                    ).join('');
                });
        }

        function sendFeedback() {
            const toUser = document.getElementById('feedbackTo').value.trim();
            const rating = document.getElementById('feedbackRating').value.trim();
            const comment = document.getElementById('feedbackComment').value.trim();
            if (!toUser || !rating || !comment) return alert("All fields are required.");

            fetch('http://localhost:3000/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fromUser: localStorage.getItem('username'),
                    toUser,
                    rating,
                    comment
                })
            }).then(() => {
                document.getElementById('feedbackComment').value = '';
                document.getElementById('feedbackTo').value = '';
                document.getElementById('feedbackRating').value = '';
                loadFeedback();
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        // Load inbox by default
        window.onload = function() {
            showSection('inbox');
        };
    </script>
</body>
</html>
